name = "rikkahub-analytics"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 database — run `npx wrangler d1 create rikkahub-stats` first,
# then paste the database_id here.
[[d1_databases]]
binding = "DB"
database_name = "rikkahub-stats"
database_id = "36b39df3-5138-4eb9-8e0e-e492f3490260"

# Dashboard auth token — change this to your own secret!
# Access dashboard at /dashboard?token=YOUR_TOKEN
[vars]
AUTH_TOKEN = "REDACTED"
